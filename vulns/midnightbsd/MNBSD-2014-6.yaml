id: MNBSD-2014-6
summary: Sendmail fails to set close-on-exec on file descriptors
details: |
  Sendmail failed to properly set the close-on-exec flag for open file descriptors. A local user could exploit the leaked descriptors passed to mail filters or delivery programs, potentially interfering with connections or gaining unintended access.
affected:
  - package:
      name: sendmail
      ecosystem: MidnightBSD
    ranges:
