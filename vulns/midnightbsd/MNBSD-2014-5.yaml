id: MNBSD-2014-5
summary: Kernel memory disclosure via ktrace page fault entries
details: |
  Ktrace page fault kernel trace entries were set to an incorrect size, resulting in a leak of information. A local user with ktrace access could read uninitialized kernel memory, potentially disclosing sensitive data.
