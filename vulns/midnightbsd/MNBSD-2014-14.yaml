id: MNBSD-2014-14
summary: routed remote routing table disruption
details: |
  The input path in routed(8) accepted queries from any source and attempted to answer them, while the output path assumed the response destination was on a directly connected network. An attacker sending traffic from outside the network could disrupt routing, causing a denial of service.
affected:
  - package:
      name: routed
      ecosystem: MidnightBSD
    ranges:
      - type: ECOSYSTEM
        events:
