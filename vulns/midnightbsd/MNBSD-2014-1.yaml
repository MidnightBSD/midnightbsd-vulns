id: MNBSD-2014-1
summary: Stack buffer overflow in bsnmpd GETBULK handling
details: |
  bsnmpd(1) contained a stack-based buffer overflow when processing certain SNMP GETBULK PDU requests. A malicious client able to reach the daemon could send crafted queries to crash bsnmpd or potentially execute arbitrary code.
