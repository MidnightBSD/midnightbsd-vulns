id: MNBSD-2014-13
summary: OpenSSL POODLE and related vulnerabilities
details: |
  OpenSSL was updated to add workarounds for the POODLE vulnerability (padding oracle on downgraded legacy encryption) reported by Google, along with additional OpenSSL fixes shipped in the same advisory. Impacts include information disclosure of plaintext via SSLv3 and denial of service.
