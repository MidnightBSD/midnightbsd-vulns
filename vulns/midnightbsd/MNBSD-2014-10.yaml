id: MNBSD-2014-10
summary: TCP SYN handling connection teardown (sequence check bypass)
details: |
  When a segment with the SYN flag arrived for an already existing connection, the TCP stack tore down the connection, bypassing the check that the segment's sequence number was within the expected window. A remote attacker could exploit this to reset connections, causing a denial of service.
