id: MNBSD-2020-7
summary: Use-after-free in IPv6 Hop-by-Hop options handling
details: |
  Due to improper mbuf handling in the kernel, a use-after-free bug could be triggered by sending IPv6 Hop-by-Hop options over the loopback interface.
