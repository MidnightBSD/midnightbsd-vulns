id: MNBSD-2014-16
summary: tnftp arbitrary command execution via crafted server response
details: |
  A security vulnerability in tnftp/ftp(1) allowed a malicious HTTP server to cause the client to execute arbitrary commands. When the output filename began with a pipe character it was passed to popen(3), enabling command execution controlled by the remote server.
affected:
  - package:
      name: tnftp
      ecosystem: MidnightBSD
    ranges:
