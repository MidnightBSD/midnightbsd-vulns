id: MNBSD-2015-10
summary: amd64 GS segment register manipulation via IRET fault
details: |
  On amd64 the GS segment CPU register could be changed to a userland-controlled value while in kernel mode by triggering an IRET with a #SS or #NP exception. This could allow a local attacker to escalate privileges or crash the kernel.
