id: MNBSD-2014-17
summary: Kernel memory disclosure via getlogin/setlogin
details: |
  getlogin(2) could leak kernel memory via a buffer that is copied to userland without being cleared. A local user could read uninitialized kernel stack memory, potentially exposing sensitive information.
