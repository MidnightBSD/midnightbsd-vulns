id: MNBSD-2015-8
summary: routed remote routing table disruption
details: |
  The input path in routed(8) accepted queries from any source and attempted to answer them, while the output path assumed the destination address for the response was on a directly connected network. Traffic from outside the network could therefore disrupt routing, resulting in a denial of service.
affected:
  - package:
      name: routed
      ecosystem: MidnightBSD
    ranges:
      - type: ECOSYSTEM
        events:
