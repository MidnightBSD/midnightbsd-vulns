id: MNBSD-2011-1
summary: Infinite loop in compress/gzip when handling malformed .Z files
details: |
  Errors in handling corrupt LZW-compressed input in compress(1) and gzip(1) can cause the utilities to enter an infinite loop when decompressing a malformed .Z file, resulting in a denial of service.
