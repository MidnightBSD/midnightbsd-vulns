id: MNBSD-2019-0
summary: Kernel memory disclosure via 32-bit compatibility ioctl handlers
details: |
  Due to insufficient initialization of memory copied to userland in several 32-bit compatibility ioctl handlers, small amounts of kernel memory may be disclosed to userland processes. A user who can invoke 32-bit FreeBSD ioctls may be able to read small portions of kernel memory, which might contain sensitive information such as file cache or terminal buffer contents.
