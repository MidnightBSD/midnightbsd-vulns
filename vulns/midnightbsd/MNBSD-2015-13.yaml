id: MNBSD-2015-13
summary: Insecure permissions on bsnmpd configuration file installation
details: |
  The bsnmpd(1) daemon installed its configuration file with insecure default permissions, exposing sensitive data such as the SNMP community/shared secret to local users. A local user able to read the configuration could obtain the credentials used by the daemon. The fix corrects the configuration file installation permissions.
affected:
  - package:
      name: bsnmpd
      ecosystem: MidnightBSD
    ranges:
      - type: ECOSYSTEM
        events:
          - introduced: "0"
          - fixed: "0.7.2"
